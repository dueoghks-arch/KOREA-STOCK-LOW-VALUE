name: KRX Quant Momentum Screener

# 1. 자동 실행 스케줄 및 수동 실행 트리거 설정
on:
  schedule:
    # 매일 월~금요일 한국 시간(KST) 오후 6:00에 자동 실행 (UTC 기준 오전 9:00)
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # GitHub 웹페이지에서 수동으로 실행하고 싶을 때 사용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 2. 리포지토리 코드 체크아웃
    - name: Check out repository code
      uses: actions/checkout@v4

    # 3. 파이썬 환경 설정 (안정적인 3.10 버전 권장)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'
        cache: 'pip' # 패키지 다운로드 속도 향상을 위한 캐싱

    # 4. 필수 외부 라이브러리 설치
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install FinanceDataReader pandas numpy requests lxml beautifulsoup4

    # 5. 스크리닝 스크립트 실행 및 환경 변수 전달
    - name: Run KRX Screener Script
      env:
        # 이메일 전송에 필요한 비밀번호/토큰을 GitHub Secrets에서 가져와 환경변수로 주입
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: |
        # 실행할 파이썬 파일명이 main.py가 아니라면 해당 파일명으로 수정하세요.
        python main.py
